<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BallIQ</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #06080F; color: #fff;
      font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 280px; }
    h1 { font-size: 22px; font-weight: 800; margin: 18px 0 8px; }
    p { color: #94A3B8; font-size: 14px; line-height: 1.5; margin: 0; }
    svg { width: 92px; height: 92px; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-label="BallIQ">
      <defs>
        <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#C4B5FD" />
          <stop offset="55%" stop-color="#A78BFA" />
          <stop offset="100%" stop-color="#7C3AED" />
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="112" fill="#0D1220" />
      <circle cx="256" cy="256" r="140" fill="url(#b)" />
    </svg>
    <h1>You&rsquo;re offline</h1>
    <p>BallIQ needs an internet connection. Check your network and try again.</p>
  </div>
</body>
</html>
