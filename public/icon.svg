<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#141C30"/>
      <stop offset="100%" stop-color="#06080F"/>
    </radialGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="55%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="ballClip"><circle cx="256" cy="256" r="150"/></clipPath>
  </defs>

  <!-- full-bleed background so the same art works as a maskable icon -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ball (kept within the maskable safe zone) -->
  <circle cx="256" cy="256" r="150" fill="url(#ball)"/>
  <g clip-path="url(#ballClip)" stroke="#0B0F1A" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9">
    <line x1="256" y1="100" x2="256" y2="412"/>
    <line x1="100" y1="256" x2="412" y2="256"/>
    <path d="M256 100 C 182 200, 182 312, 256 412"/>
    <path d="M256 100 C 330 200, 330 312, 256 412"/>
  </g>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
</svg>
